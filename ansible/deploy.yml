- name: Deploy mini CI/CD application
  hosts: "{{ target }}"
  become: true

  tasks:
    - name: Create application directory
      file:
        path: /opt/mini-cicd-app
        state: directory
        mode: '0755'

    - name: Copy docker-compose.yml
      copy:
        src: ../deploy/docker-compose.yml
        dest: /opt/mini-cicd-app/docker-compose.yml
        mode: '0644'

    - name: Install Docker Compose standalone
      get_url:
        url: https://github.com/docker/compose/releases/download/v2.29.7/docker-compose-linux-x86_64
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    - name: Pull latest Docker images
      command: /usr/local/bin/docker-compose pull
      args:
        chdir: /opt/mini-cicd-app

    - name: Restart application containers
      command: /usr/local/bin/docker-compose up -d
      args:
        chdir: /opt/mini-cicd-app

    - name: Check running containers
      command: docker ps
      register: docker_ps_result

    - name: Display running containers
      debug:
        var: docker_ps_result.stdout

