apiVersion: apps/v1
kind: Deployment
metadata:
  name: mini-cicd-frontend
  namespace: mini-cicd
spec:
  template:
    metadata:
      labels: 
        app: mini-cicd-frontend
    spec:
      containers:
        - name: frontend
          image: harrod1/mini-cicd-frontend:latest          
          imagepullpolicy: Always
          ports:
            - containerport: 80
    replicas: 2
    selector:
      matchLabels:
        app: mini-cicd-frontend

