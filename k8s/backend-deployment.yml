apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: mini-cicd
spec:
  template:
    metadata:
      name: backend
      labels:
        app: mini-cicd-backend
    spec:
      containers:
        - name: backend 
          image: harrod1/mini-cicd-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
  replicas: 2
  selector:
    matchLabels:
      app: mini-cicd-backend
